<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynx Sport Club | Oficial</title>
    <style>
        /* FONDO DESVANECIDO CON TU LOGO */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('WhatsApp Image 2026-04-08 at 1.57.20 PM.jpeg') no-repeat center center;
            background-size: contain;
            opacity: 0.1; 
            z-index: -1;
            background-attachment: fixed;
        }

        body {
            margin: 0;
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: #0d0d0d;
            color: white;
            text-align: center;
        }

        header {
            background: black;
            padding: 30px;
            border-bottom: 3px solid white;
        }

        h1 { margin: 0; letter-spacing: 2px; }

        .section { padding: 50px 20px; }

        .players {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }

        .card {
            background: rgba(26, 26, 26, 0.9);
            padding: 20px;
            width: 280px;
            border-radius: 15px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .card:hover { border-color: #00bcd4; transform: scale(1.02); }

        /* Estilo para imágenes sueltas y dentro de galerías */
        .card img, .galeria img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            display: none; /* Ocultas al inicio */
            margin-bottom: 15px;
            border: 1px solid #444;
        }

        /* Contenedor de la galería */
        .galeria {
            display: none; 
        }

        .btn {
            background: white;
            color: black;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover { background: #00bcd4; color: white; }

        .contact-area {
            margin-top: 50px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: inline-block;
        }

        .whatsapp-link {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #25d366;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        .whatsapp-link:hover { background: #128c7e; transform: translateY(-3px); }

    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <header>
        <h1>LYNX SPORT CLUB 🏐</h1>
    </header>

    <div class="section">
        <h2>NUESTRAS CATEGORÍAS</h2>
        
        <div class="players">
            <div class="card">
                <img src="u9.jpeg" id="cat1">
                <h3>SUB 9</h3>
                <button class="btn" onclick="mostrar('cat1')">Ver Fotos</button>
            </div>

            <div class="card">
                <img src="u11 mixto 2.jpeg" id="cat2">
                <h3>U11 MIXTO</h3>
                <button class="btn" onclick="mostrar('cat2')">Ver Fotos</button>
            </div>

            <div class="card">
                <img src="u12 mixto.jpeg" id="cat3">
                <h3>U12 MIXTO</h3>
                <button class="btn" onclick="mostrar('cat3')">Ver Fotos</button>
            </div>

            <div class="card">
                <div class="galeria" id="cat4">
                    <img src="u17 damas.jpeg" style="display: block;"> 
                    <img src="u17 (1).jpeg" style="display: block;">
                    <img src="u17 (2).jpeg" style="display: block;">
                </div>
                <h3>U17 DAMAS</h3>
                <button class="btn" onclick="mostrar('cat4')">Ver Fotos</button>
            </div>

            <div class="card">
                <div class="galeria" id="cat5">
                    <img src="u15 varones.jpeg" style="display: block;">
                    <img src="varones mayores.jpeg" style="display: block;"> 
                    <img src="u15 vaarones.jpeg" style="display: block;">
                    <img src="u.jpeg" style="display: block;"> </div>
                <h3>VARONES</h3>
                <button class="btn" onclick="mostrar('cat5')">Ver Fotos</button>
            </div>
        </div>

        <div class="contact-area">
            <h3>¿QUIERES INSCRIBIRTE?</h3>
            <p>Escríbenos directamente por WhatsApp</p>
            <a href="https://wa.me/51958596986" class="whatsapp-link" target="_blank">
                📱 HABLAR CON LYNX
            </a>
            <p style="margin-top: 15px; font-size: 14px; opacity: 0.7;">Tel: 958 596 986 | Arequipa</p>
        </div>
    </div>

    <script>
        function mostrar(id) {
            var elemento = document.getElementById(id);
            
            if (elemento) {
                if (elemento.style.display === "block") {
                    elemento.style.display = "none";
                } else {
                    elemento.style.display = "block";
                }
            } else {
                console.error("Error: No encontré el elemento con el ID: " + id);
            }
        }
    </script>

</body>
</html>
